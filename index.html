<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Segna Ore</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273549;
    --text:#f1f5f9; --muted:#94a3b8; --line:#334155;
    --green:#22c55e; --green-d:#16a34a;
    --red:#ef4444; --red-d:#dc2626;
    --accent:#38bdf8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding:16px; padding-bottom:40px; max-width:560px; margin:0 auto;
    min-height:100vh;
  }
  h1{font-size:20px; margin:4px 0 16px; display:flex; align-items:center; gap:8px;}
  h1 .dot{width:10px; height:10px; border-radius:50%; background:var(--muted);}
  h1 .dot.live{background:var(--green); box-shadow:0 0 0 0 rgba(34,197,94,.6); animation:pulse 1.6s infinite;}
  @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:16px;}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px;}
  input[type=text], input[type=number]{
    width:100%; background:var(--card2); border:1px solid var(--line); color:var(--text);
    font-size:17px; padding:13px 14px; border-radius:12px; outline:none;
  }
  input:focus{border-color:var(--accent);}

  .timer{text-align:center; font-variant-numeric:tabular-nums; font-weight:700; letter-spacing:1px;
    font-size:46px; margin:6px 0 4px;}
  .timer.idle{color:var(--muted);}
  .sub{text-align:center; color:var(--muted); font-size:14px; margin-bottom:14px; min-height:20px;}
  .sub b{color:var(--text);}

  button{font-family:inherit; cursor:pointer; border:none;}
  .bigbtn{
    width:100%; padding:22px; border-radius:16px; font-size:24px; font-weight:700; color:#fff;
    display:flex; align-items:center; justify-content:center; gap:10px; transition:transform .05s;
  }
  .bigbtn:active{transform:scale(.98);}
  .bigbtn.arrivo{background:linear-gradient(180deg,var(--green),var(--green-d));}
  .bigbtn.finito{background:linear-gradient(180deg,var(--red),var(--red-d));}

  .row{display:flex; gap:10px;}
  .row > *{flex:1;}

  .summary{display:flex; gap:10px; margin-bottom:16px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 8px; text-align:center;}
  .stat .n{font-size:18px; font-weight:700;}
  .stat .l{font-size:11px; color:var(--muted); margin-top:2px;}

  .sectitle{display:flex; justify-content:space-between; align-items:center; margin:4px 2px 10px;}
  .sectitle h2{font-size:15px; margin:0; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px;}
  .linkbtn{background:none; color:var(--accent); font-size:14px; padding:6px;}

  .job{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:10px;}
  .job .top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .job .name{font-weight:600; font-size:16px;}
  .job .cost{font-weight:700; font-size:18px; color:var(--green); white-space:nowrap;}
  .job .meta{color:var(--muted); font-size:12.5px; margin-top:5px; line-height:1.5;}
  .job .meta .iva{color:#cbd5e1;}
  .job .delrow{display:flex; justify-content:flex-end; margin-top:2px;}
  .job .del{background:none; color:var(--muted); font-size:13px; padding:4px 6px; margin:-2px -6px -2px 0;}
  .empty{color:var(--muted); text-align:center; padding:24px 0; font-size:14px;}

  .settings-toggle{background:none; color:var(--muted); font-size:13px; padding:4px;}
  .hidden{display:none;}
  .rate-line{font-size:13px; color:var(--muted); text-align:center; margin-top:10px;}
  .rate-line b{color:var(--text);}
  .hint{font-size:12px; color:var(--muted); margin-top:8px;}
</style>
</head>
<body>

<h1><span class="dot" id="statusDot"></span> Segna Ore</h1>

<!-- Stato lavoro in corso / nuovo lavoro -->
<div class="card">
  <label for="cliente">Cliente / Lavoro</label>
  <input type="text" id="cliente" placeholder="Es. Rossi Mario — Via Roma 5" autocomplete="off">

  <div class="timer idle" id="timer">00:00:00</div>
  <div class="sub" id="subText">Premi «Arrivo» quando inizi</div>

  <button class="bigbtn arrivo" id="mainBtn">▶ Arrivo</button>

  <div class="rate-line">Tariffa: <b id="rateLabel">60 €/h + IVA 22%</b>
    <button class="settings-toggle" id="settingsToggle">⚙ Modifica</button>
  </div>

  <div class="hidden" id="settingsBox" style="margin-top:12px; border-top:1px solid var(--line); padding-top:12px;">
    <div class="row">
      <div>
        <label for="rate">Tariffa oraria netta (€)</label>
        <input type="number" id="rate" inputmode="decimal" min="0" step="1" value="60">
      </div>
      <div>
        <label for="iva">IVA (%)</label>
        <input type="number" id="iva" inputmode="decimal" min="0" step="1" value="22">
      </div>
    </div>
    <div style="margin-top:10px;">
      <label for="arrotonda">Arrotonda a (minuti)</label>
      <input type="number" id="arrotonda" inputmode="numeric" min="0" step="1" value="15">
    </div>
    <div class="hint">Arrotonda a 15 = fatturi a quarti d'ora (es. 1h05 → 1h15). Metti 0 per il tempo esatto.</div>
  </div>
</div>

<!-- Riepilogo -->
<div class="summary">
  <div class="stat"><div class="n" id="totOre">0h</div><div class="l">Ore</div></div>
  <div class="stat"><div class="n" id="totImponibile">0 €</div><div class="l">Imponibile</div></div>
  <div class="stat"><div class="n" id="totTotale">0 €</div><div class="l">Tot. c/IVA</div></div>
</div>

<!-- Storico -->
<div class="sectitle">
  <h2 id="storicoTitle">Storico</h2>
  <button class="linkbtn" id="exportBtn">⬇ Esporta CSV</button>
</div>
<div id="lista"></div>

<script>
(function(){
  "use strict";
  const LS_JOBS = "segnaore_jobs";
  const LS_CFG  = "segnaore_cfg";
  const LS_ACTIVE = "segnaore_active";

  const $ = id => document.getElementById(id);
  const timerEl = $("timer"), subEl = $("subText"), mainBtn = $("mainBtn"),
        clienteEl = $("cliente"), dot = $("statusDot");

  const DEFAULTS = {rate:60, round:15, iva:22, v:2};
  let cfg = load(LS_CFG, null);
  // prima volta o configurazione vecchia → imposta i default richiesti (60€ + IVA 22% + 15 min)
  if(!cfg || cfg.v !== 2){
    cfg = Object.assign({}, DEFAULTS);
    save(LS_CFG, cfg);
  }

  let jobs = load(LS_JOBS, []);
  let active = load(LS_ACTIVE, null); // {cliente, start}
  let tick = null;

  // ---- util ----
  function load(k, def){ try{ const v = JSON.parse(localStorage.getItem(k)); return v==null?def:v; }catch(e){ return def; } }
  function save(k, v){ localStorage.setItem(k, JSON.stringify(v)); }
  function pad(n){ return String(n).padStart(2,"0"); }
  function fmtDur(ms){
    const s = Math.floor(ms/1000);
    return pad(Math.floor(s/3600))+":"+pad(Math.floor(s/60)%60)+":"+pad(s%60);
  }
  function euro(n){
    return (Math.round(n*100)/100).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
  }
  function fmtDate(ts){
    const d = new Date(ts);
    return pad(d.getDate())+"/"+pad(d.getMonth()+1)+" "+pad(d.getHours())+":"+pad(d.getMinutes());
  }
  // durata fatturabile in ore, con arrotondamento opzionale
  function billableHours(ms){
    let min = ms/60000;
    const r = Number(cfg.round)||0;
    if(r>0) min = Math.ceil(min/r)*r;
    return min/60;
  }
  // calcola imponibile / iva / totale da una durata in ms
  function calc(ms){
    const rate = Number(cfg.rate)||0;
    const ivaP = Number(cfg.iva)||0;
    const imponibile = billableHours(ms) * rate;
    const iva = imponibile * ivaP/100;
    return { imponibile, iva, totale: imponibile+iva, rate, ivaP };
  }

  // ---- config UI ----
  $("rate").value = cfg.rate;
  $("iva").value = cfg.iva;
  $("arrotonda").value = cfg.round;
  function refreshRateLabel(){
    $("rateLabel").textContent = (Number(cfg.rate)||0)+" €/h + IVA "+(Number(cfg.iva)||0)+"%";
  }
  refreshRateLabel();

  $("settingsToggle").addEventListener("click", ()=> $("settingsBox").classList.toggle("hidden"));
  $("rate").addEventListener("input", e=>{ cfg.rate = parseFloat(e.target.value)||0; save(LS_CFG,cfg); refreshRateLabel(); if(active) updateTimer(); });
  $("iva").addEventListener("input", e=>{ cfg.iva = parseFloat(e.target.value)||0; save(LS_CFG,cfg); refreshRateLabel(); if(active) updateTimer(); });
  $("arrotonda").addEventListener("input", e=>{ cfg.round = parseInt(e.target.value)||0; save(LS_CFG,cfg); if(active) updateTimer(); });

  // ---- timer ----
  function startTick(){ stopTick(); tick = setInterval(updateTimer, 1000); updateTimer(); }
  function stopTick(){ if(tick){ clearInterval(tick); tick=null; } }
  function updateTimer(){
    if(!active) return;
    const ms = Date.now() - active.start;
    timerEl.textContent = fmtDur(ms);
    const c = calc(ms);
    subEl.innerHTML = "In corso · <b>"+euro(c.imponibile)+"</b> + IVA = "+euro(c.totale);
  }

  function renderActiveState(){
    if(active){
      clienteEl.value = active.cliente;
      clienteEl.disabled = true;
      timerEl.classList.remove("idle");
      dot.classList.add("live");
      mainBtn.textContent = "■ Finito";
      mainBtn.className = "bigbtn finito";
      startTick();
    } else {
      clienteEl.disabled = false;
      timerEl.classList.add("idle");
      timerEl.textContent = "00:00:00";
      subEl.textContent = "Premi «Arrivo» quando inizi";
      dot.classList.remove("live");
      mainBtn.textContent = "▶ Arrivo";
      mainBtn.className = "bigbtn arrivo";
      stopTick();
    }
  }

  // ---- azione principale ----
  mainBtn.addEventListener("click", ()=>{
    if(!active){
      const nome = clienteEl.value.trim() || "Senza nome";
      active = { cliente: nome, start: Date.now() };
      save(LS_ACTIVE, active);
      renderActiveState();
    } else {
      const end = Date.now();
      const ms = end - active.start;
      const c = calc(ms);
      const job = {
        id: Date.now(),
        cliente: active.cliente,
        start: active.start,
        end: end,
        ms: ms,
        rate: c.rate,
        ivaP: c.ivaP,
        imponibile: c.imponibile,
        iva: c.iva,
        totale: c.totale
      };
      jobs.unshift(job);
      save(LS_JOBS, jobs);
      active = null;
      localStorage.removeItem(LS_ACTIVE);
      clienteEl.value = "";
      renderActiveState();
      renderList();
    }
  });

  // ---- storico ----
  function renderList(){
    let totMs=0, totImp=0, totTot=0;
    jobs.forEach(j=>{ totMs+=j.ms; totImp+=(j.imponibile||0); totTot+=(j.totale||0); });
    $("totOre").textContent = (Math.round(totMs/360000)/10).toLocaleString("it-IT")+"h";
    $("totImponibile").textContent = euro(totImp);
    $("totTotale").textContent = euro(totTot);
    $("storicoTitle").textContent = jobs.length ? ("Storico · "+jobs.length) : "Storico";

    const lista = $("lista");
    if(jobs.length===0){
      lista.innerHTML = '<div class="empty">Nessun lavoro registrato.<br>Il primo apparirà qui.</div>';
      return;
    }
    lista.innerHTML = "";
    jobs.forEach(j=>{
      const el = document.createElement("div");
      el.className = "job";
      el.innerHTML =
        '<div class="top"><span class="name"></span><span class="cost">'+euro(j.totale||0)+'</span></div>'+
        '<div class="meta">'+
          '<div class="when"></div>'+
          '<div class="iva">Imponibile '+euro(j.imponibile||0)+'  ·  + IVA '+(j.ivaP||0)+'% '+euro(j.iva||0)+'</div>'+
        '</div>'+
        '<div class="delrow"><button class="del">Elimina</button></div>';
      el.querySelector(".name").textContent = j.cliente;
      el.querySelector(".when").textContent =
        fmtDate(j.start) + " → " + fmtDate(j.end) + "  ·  " + fmtDur(j.ms) + "  ·  " + (j.rate||0) + "€/h";
      el.querySelector(".del").addEventListener("click", ()=>{
        if(confirm("Eliminare «"+j.cliente+"»?")){
          jobs = jobs.filter(x=>x.id!==j.id);
          save(LS_JOBS, jobs);
          renderList();
        }
      });
      lista.appendChild(el);
    });
  }

  // ---- export CSV ----
  $("exportBtn").addEventListener("click", ()=>{
    if(jobs.length===0){ alert("Nessun dato da esportare."); return; }
    const num = n => (Math.round(n*100)/100).toFixed(2).replace(".",",");
    const rows = [["Cliente","Inizio","Fine","Durata","Tariffa €/h","Imponibile €","IVA %","IVA €","Totale €"]];
    jobs.slice().reverse().forEach(j=>{
      rows.push([
        j.cliente,
        new Date(j.start).toLocaleString("it-IT"),
        new Date(j.end).toLocaleString("it-IT"),
        fmtDur(j.ms),
        String(j.rate||0).replace(".",","),
        num(j.imponibile||0),
        String(j.ivaP||0).replace(".",","),
        num(j.iva||0),
        num(j.totale||0)
      ]);
    });
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(";")).join("\n");
    const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "segna-ore-"+new Date().toISOString().slice(0,10)+".csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // ---- avvio ----
  refreshRateLabel();
  renderActiveState();
  renderList();
})();
</script>
</body>
</html>
